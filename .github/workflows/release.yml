# Builds SSTP Shield for Android, Linux and Windows, and — when a version tag is
# pushed — publishes the results to a GitHub Release on the PUBLIC releases repo.
#
#   push to main / PR : build all three, upload as workflow artifacts (a smoke
#                       test; nothing is published)
#   push a v* tag     : the same builds, plus a Release on the public repo below
#
# This source repo is PRIVATE. Only the built assets are exposed, and they land
# in a separate public repo:
#
#   RELEASE_REPO  = atasanbratan/sstp_shield_releases  (public; README + assets)
#
# Two things follow from the split, both driven by the GH_PAT secret (a PAT with
# `repo` scope on this account):
#   * the app's tunnel dependencies (sstp_vpn_plugin -> softether_client ->
#     sstp_client) are git deps on now-private repos, so every job authenticates
#     git before `flutter pub get`;
#   * the release job publishes cross-repo into RELEASE_REPO with that token.
#
# Android is signed with a REAL release key, supplied through repository secrets
# (never committed). If the secrets are absent the build still runs but falls
# back to debug keys and says so; such an APK is not distributable, so tag builds
# require the secrets to be set.

name: release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release on a tag

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - name: Authenticate git for private dependencies
        shell: bash
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - run: flutter pub get
      - run: flutter analyze

  android:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }

      # Reconstruct the signing material from secrets. KEYSTORE_BASE64 is the
      # .jks run through `base64 -w0`. Without it, the Gradle script warns and
      # uses debug keys (fine for a branch smoke-test, refused for a tag below).
      - name: Write signing config
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # A tagged (i.e. published) build MUST be properly signed. Fail loudly
      # rather than attach a debug-signed APK to a Release.
      - name: Require signing for tagged releases
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 == '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "::error::Tagged release but signing secrets are not set. Add KEYSTORE_BASE64, STORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD."
          exit 1

      - name: Authenticate git for private dependencies
        shell: bash
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - run: flutter pub get
      - name: Build APKs (universal + per-ABI, for local and foreign)
        run: |
          set -euo pipefail
          build_variant() {
            target="$1"; name="$2"
            # Universal APK — bundles every ABI, the safe default for users who
            # don't know their device's architecture (~50 MB).
            flutter build apk --release --flavor standard --target "$target"
            mv build/app/outputs/flutter-apk/app-standard-release.apk \
               "sstp-shield-${name}.apk"
            # Per-ABI splits — much smaller downloads (~20 MB) for users who do.
            flutter build apk --release --split-per-abi --flavor standard --target "$target"
            for abi in armeabi-v7a arm64-v8a x86_64; do
              mv "build/app/outputs/flutter-apk/app-${abi}-standard-release.apk" \
                 "sstp-shield-${name}-${abi}.apk"
            done
          }
          build_variant lib/main.dart local
          build_variant lib/main_foreign.dart foreign

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: sstp-shield-*.apk
          if-no-files-found: error

  linux:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - uses: actions/setup-go@v5
        with: { go-version: 'stable' }
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config \
            build-essential libssl-dev
      - name: Authenticate git for private dependencies
        shell: bash
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - run: flutter pub get
      - run: flutter build linux --release --target lib/main.dart

      # Build the SoftEther client (vpnclient/vpncmd/hamcore) and compile the
      # privileged pkexec helper, so the SoftEther protocol works out of the box.
      - name: Build & stage SoftEther
        run: |
          git clone --depth 1 https://github.com/atasanbratan/softether_client.git /tmp/se
          bash /tmp/se/tool/fetch_softether.sh /tmp/se/softether
          (cd /tmp/se && dart pub get && \
            dart compile exe bin/softether_helper.dart -o softether/softether-helper)
          ls -la /tmp/se/softether

      # Ship the privilege setup with the bundle: it creates a TUN device, which
      # needs CAP_NET_ADMIN, and the setup is three non-obvious steps. The bundle
      # alone is a trap. (The script can't run in CI — it bakes an absolute
      # RUNPATH for the machine the bundle finally lives on.)
      - name: Package
        run: |
          STAGE=sstp-shield-linux-x64
          mkdir -p "$STAGE"
          cp -r build/linux/x64/release/bundle/. "$STAGE/"
          # SoftEther client + pkexec helper, next to the executable.
          mkdir -p "$STAGE/softether"
          cp /tmp/se/softether/vpnclient /tmp/se/softether/vpncmd \
             /tmp/se/softether/hamcore.se2 /tmp/se/softether/softether-helper \
             "$STAGE/softether/"
          # setup_privilege.sh + ip_wrapper.c come from the plugin.
          git clone --depth 1 https://github.com/atasanbratan/sstp_vpn_plugin.git /tmp/plugin
          mkdir -p "$STAGE/tool"
          cp /tmp/plugin/tool/setup_privilege.sh /tmp/plugin/tool/ip_wrapper.c "$STAGE/tool/"
          # Go/uTLS TLS relay: lets the SSTP protocol get past networks that
          # fingerprint-block Dart's TLS ClientHello. The app auto-discovers it
          # at <exeDir>/tls-relay/sstp-tls-relay.
          mkdir -p "$STAGE/tls-relay"
          go build -C /tmp/plugin/go/tls_relay -trimpath \
            -o "$(pwd)/$STAGE/tls-relay/sstp-tls-relay" .
          cat > "$STAGE/README-FIRST.txt" <<'EOF'
          SSTP protocol (default): do NOT run with sudo. Grant CAP_NET_ADMIN once
          (needs gcc, libcap, patchelf), then launch the generated sstp-vpn script:
              ./tool/setup_privilege.sh ./sstp_shield
              ./sstp-vpn

          SoftEther protocol: no setup needed - just run ./sstp_shield. Choosing
          SoftEther elevates a helper via pkexec (needs polkit; a password prompt
          appears on connect).
          EOF
          tar czf sstp-shield-linux-x64.tar.gz "$STAGE"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: sstp-shield-linux-x64.tar.gz
          if-no-files-found: error

  windows:
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - uses: actions/setup-go@v5
        with: { go-version: 'stable' }
      - name: Authenticate git for private dependencies
        shell: bash
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - run: flutter pub get
      - run: flutter build windows --release --target lib/main.dart

      # Go/uTLS TLS relay, bundled beside the exe so SSTP can get past networks
      # that fingerprint-block Dart's TLS ClientHello. Auto-discovered by the app
      # at <exeDir>\tls-relay\sstp-tls-relay.exe.
      - name: Build & stage TLS relay
        shell: bash
        run: |
          git clone --depth 1 https://github.com/atasanbratan/sstp_vpn_plugin.git /tmp/plugin
          OUT="build/windows/x64/runner/Release/tls-relay"
          mkdir -p "$OUT"
          go build -C /tmp/plugin/go/tls_relay -trimpath -o "$OUT/sstp-tls-relay.exe" .
          ls -la "$OUT"

      # Guard the two things that fail silently on this platform (both proven in
      # sstp_vpn_plugin's own CI): the bundled Wintun DLL, and the elevation
      # request without which every connect() dies as missingPrivilege.
      - name: Verify Wintun bundled and exe is elevated
        shell: pwsh
        run: |
          $out = "build/windows/x64/runner/Release"
          if (-not (Test-Path "$out/wintun.dll")) { throw "wintun.dll missing from $out" }
          $exe = "$out/sstp_shield.exe"
          $txt = [Text.Encoding]::ASCII.GetString([IO.File]::ReadAllBytes($exe))
          if ($txt -notmatch "requireAdministrator") {
            throw "$exe is not marked requireAdministrator — check /MANIFESTUAC in windows/runner/CMakeLists.txt"
          }
          Write-Host "OK: wintun.dll bundled and exe requests elevation."

      # No SoftEther binaries are bundled on Windows: creating the virtual
      # adapter installs a signed NDIS driver that only SoftEther's own
      # installer can stage (a bundled copy fails NicCreate with error 31/32).
      # The app detects and drives the user's installed VPN Client instead.

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath sstp-shield-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: sstp-shield-windows-x64.zip
          if-no-files-found: error

  release:
    # Only on a version tag. Gathers the three platform artifacts and publishes
    # them as a Release on the PUBLIC releases repo — this source repo is private,
    # so the assets are the only thing exposed. Cross-repo publish needs GH_PAT
    # (the default GITHUB_TOKEN can only write to this repo). The tag is created
    # in the target repo pointing at its default branch; release notes are not
    # auto-generated there (its history is just the README, not the app commits).
    if: startsWith(github.ref, 'refs/tags/')
    needs: [android, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Publish Release to public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: atasanbratan/sstp_shield_releases
          token: ${{ secrets.GH_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            SSTP Shield ${{ github.ref_name }} — automated build.

            See the README for installation and usage. Assets below:
            Android APKs (universal + per-ABI), Linux x64 tarball, Windows x64 zip.
          files: dist/**/*
          fail_on_unmatched_files: true
